<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ColorMage</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
    html, body { margin: 0; height: 100%; background: #0a0a1c; overflow: hidden; }
    body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: 'VT323', monospace; text-align: center; padding-bottom: 50px;
    }
    .logo { width: 400px; max-width: 85%; margin-top: -100px; margin-bottom: -70px; pointer-events: none; image-rendering: auto; }
    .btn {
        font-family: 'VT323', monospace; font-size: 1.6rem; color: #0a0a1c; background: #ffc83c;
        text-decoration: none; padding: 15px 50px; border-radius: 8px; box-shadow: 0 5px 0 #c8961e;
        transition: transform 0.1s, box-shadow 0.1s; display: inline-flex; align-items: center; justify-content: center; font-weight: bold;
    }
    .btn:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }
    .note { color: #8a8aa0; font-size: 1.1rem; max-width: 90%; margin-top: 25px; }
</style>
</head>
<body>
    <img class="logo" src="https://emrecan45.github.io/colormage/logo.png" alt="ColorMage">
    <a class="btn" href="https://emrecan45.github.io/colormage/" target="_blank" rel="noopener">▶ Play</a>
    <div class="note">Opens in a new tab so your progress is saved between sessions.</div>
</body>
</html>
